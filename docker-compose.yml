services:
  app:
    image: abhivishwakarma9874/laravel-app:latest
    container_name: laravel_app
    ports:
      - "8000:8000"
    working_dir: /var/www
    volumes:
      - .:/var/www
    environment:
      APP_NAME: Laravel
      APP_ENV: production
      APP_KEY: base64:lNMC6YzdVuGTSIDLH0gnvsMG4WIaDDXiUSNoErm69YU=
      APP_DEBUG: "false"
      APP_URL: http://localhost
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
      SESSION_DRIVER: file
      CACHE_STORE: file
      FILESYSTEM_DISK: local
      QUEUE_CONNECTION: sync
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      MAIL_MAILER: log
      MAIL_FROM_ADDRESS: "hello@example.com"
      MAIL_FROM_NAME: "${APP_NAME}"